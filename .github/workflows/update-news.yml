name: Update daily cybersecurity news

on:
  schedule:
    # 23:00 UTC = ประมาณ 06:00 น. เวลาไทย (UTC+7)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch latest news
        run: node scripts/fetch-news.js

      - name: Fetch latest CVEs
        run: node scripts/fetch-cve.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/cve.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update daily news & CVEs ($(date -u +'%Y-%m-%d'))"
            git push
          fi
